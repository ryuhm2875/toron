<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, doc,
    query, where, onSnapshot, getDocs
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCnFDHXaI_kgPmlTgriq0H65MYox-_KPmw",
    authDomain: "talktalk-fd197.firebaseapp.com",
    projectId: "talktalk-fd197",
    storageBucket: "talktalk-fd197.firebasestorage.app",
    messagingSenderId: "403052420497",
    appId: "1:403052420497:web:69bd9f1e60a340ea494e30"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const votesCol = collection(db, "jury_votes");

  window.fbSubmitJuryVote = async function(data){
    await addDoc(votesCol, data);
  };

  window.fbListenJury = function(round, callback){
    const q = query(votesCol, where("round", "==", String(round)));
    return onSnapshot(q, (snap) => {
      const entries = [];
      snap.forEach(d => entries.push({ id: d.id, ...d.data() }));
      callback(entries);
    }, (err) => {
      console.error("jury listen error", err);
    });
  };

  window.fbResetJury = async function(round){
    const q = query(votesCol, where("round", "==", String(round)));
    const snap = await getDocs(q);
    const jobs = [];
    snap.forEach(d => jobs.push(deleteDoc(doc(db, "jury_votes", d.id))));
    await Promise.all(jobs);
  };
</script>

/* ---------------- 배심원 실시간 투표 모드 감지 ---------------- */

const FRUITBASKET_Q = [
  "오늘의 컨디션을 점수로 하면 몇 점?",
  "살면서 본 영화나 드라마 중에서 가장 재미있었던 것",

  "본인의 가장 귀여운 포인트는?"
];

const SPEED_TOPICS = [
  "최근에 산 물건 중 제일 마음에 드는 것은?",
  "여행 가고 싶은 나라 한 곳과 그 이유",
  "나만 아는 편식 습관이 있다면?",
  "요즘 가장 자주 듣는 노래는?",
  "초능력을 하나 가질 수 있다면 뭘 고를래?",
  "인생 최고의 간식은?",
  "좋아하는 계절과 그 이유",
  "오늘 처음 만난 친구에게 궁금한 점 하나",
  "나만의 스트레스 해소법은?",

];

/* ---------------- 스테이지 정의 ---------------- */
function timerStagesForRound(r){
  return ROUND_PARTS.map(p => ({ type:"timer", round:r, ...p }));
}

const STAGES = [
  { type:"title" },
  { type:"info-schedule" },
  { type:"info-safety" },
  { type:"section", label:"생각 열기", title:"본격적으로 몸부터 풀어볼까요?" },
  { type:"fruitbasket" },
  { type:"speedtalk" },
  { type:"section", label:"생각 열기", title:"미리 보는 오늘의 토론!" },
  { type:"vote", pool:"A" },
  { type:"vote", pool:"B" },
  { type:"section", label:"학교별 토론", title:"이제 진짜 토론을 시작합니다" },
  { type:"roundtitle", round:1 },
  { type:"timetable", round:1 },
  ...timerStagesForRound(1),
  { type:"roundtitle", round:2 },
  { type:"timetable", round:2 },
  ...timerStagesForRound(2),
  { type:"outro" }
];

/* ---------------- 상태 ---------------- */
let current = 0;
const timerState = {}; // idx -> {left, running, total, intervalId}
let speedTimer = { left:30, running:false, intervalId:null };
let speedQueue = shuffle(SPEED_TOPICS);
let speedTopicText = "";
const votePools = {
  A: { label:"동강중 · 고흥대서중", topic:"e스포츠를 올림픽 정식 종목으로 인정해야 한다", remaining: shuffle(ALL_STUDENTS.filter(s=>s.school==="동강중"||s.school==="고흥대서중")), picked: [] },
  B: { label:"과역중 · 백양중", topic:"AI가 친구를 대체할 수 있다", remaining: shuffle(ALL_STUDENTS.filter(s=>s.school==="과역중"||s.school==="백양중")), picked: [] }
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ---------------- 오디오 알림 ---------------- */
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type="sine"; o.frequency.value=880;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    o.start();
    o.stop(ctx.currentTime+0.4);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
  }catch(e){}
}

function render(){
  const stage = STAGES[current];
  const el = document.getElementById("stage-inner");
  el.innerHTML = renderStage(stage, current);
  document.getElementById("stage-count").textContent = `${current+1} / ${STAGES.length}`;
  document.getElementById("progress-fill").style.width = `${((current+1)/STAGES.length)*100}%`;
  document.getElementById("prev-btn").disabled = current===0;

  if(stage.type==="timer" && stage.part==="배심원 판결"){

  } else {
    stopJuryListening();
  }
}

/* ---------------- 타이머 로직 (라운드 파트) ---------------- */
function timerBlockHTML(key, minutes, label, side){
  const st = getTimerState(key, minutes);
  const warn = st.left<=st.total*0.2;
  return `
    <div class="timer-mini">
      <div class="timer-mini-label"><span class="tag ${side}">${label}</span></div>
      <div class="ring-box" style="width:170px;height:170px;">
        <svg viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
          <circle class="ring-fg ${warn?'warn':''}" id="ring-fg-${key}" cx="60" cy="60" r="52"
            stroke-dasharray="${2*Math.PI*52}" stroke-dashoffset="${2*Math.PI*52*(1-st.left/st.total)}"></circle>
        </svg>
        <div class="timer-digits ${warn?'warn':''}" id="digits-${key}" style="font-size:2.1rem;">${formatTime(st.left)}</div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn start" data-act="start" data-idx="${key}">${st.running?'진행 중':'시작'}</button>
        <button class="timer-btn" data-act="pause" data-idx="${key}">일시정지</button>
        <button class="timer-btn" data-act="reset" data-idx="${key}">초기화</button>
      </div>
    </div>
  `;
}
function getTimerState(idx, minutes){
  if(!timerState[idx]) timerState[idx] = { left: minutes*60, total: minutes*60, running:false, intervalId:null };
  return timerState[idx];
}
function tickTimer(idx){
  const st = timerState[idx];
  const digits = document.getElementById(`digits-${idx}`);
  const ring = document.getElementById(`ring-fg-${idx}`);
  if(!digits || !ring) return;
  st.left = Math.max(0, st.left-1);
  digits.textContent = formatTime(st.left);
  ring.setAttribute("stroke-dashoffset", 2*Math.PI*52*(1-st.left/st.total));
  const warn = st.left <= st.total*0.2;
  digits.classList.toggle("warn", warn);
  ring.classList.toggle("warn", warn);
  if(st.left<=0){
    clearInterval(st.intervalId);
    st.running = false;
    playBeep();
    const wrap = digits.closest(".timer-wrap, .timer-mini");
    if(wrap) wrap.classList.add("timer-endflash");
  }
}
function formatTime(sec){
  const m = Math.floor(sec/60).toString().padStart(2,"0");
  const s = (sec%60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

/* ---------------- 스피드토크 타이머 ---------------- */
function tickSpeed(){
  speedTimer.left = Math.max(0, speedTimer.left-1);
  const digits = document.getElementById("speed-digits");
  const ring = document.getElementById("speed-ring");
  if(digits) digits.textContent = formatTime(speedTimer.left);
  if(ring) ring.setAttribute("stroke-dashoffset", 2*Math.PI*52*(1-speedTimer.left/30));
  const warn = speedTimer.left<=6;
  if(digits) digits.classList.toggle("warn", warn);
  if(ring) ring.classList.toggle("warn", warn);
  if(speedTimer.left<=0){
    clearInterval(speedTimer.intervalId);
    speedTimer.running = false;
    playBeep();
  }
}

/* ---------------- 배심원 실시간 투표 ---------------- */
function juryVoteUrl(round){
  return `${window.location.origin}${window.location.pathname}?mode=vote&round=${round}`;
}
function juryQrImgUrl(round){
  return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(juryVoteUrl(round))}`;
}
function juryTally(round){
  const entries = Object.values(juryData[round]).sort((a,b)=>b.ts-a.ts);
  const pro = entries.filter(e=>e.winner==="찬성측").length;
  const con = entries.filter(e=>e.winner==="반대측").length;
  return { entries, pro, con, total: entries.length };
}
function renderJuryPanelHTML(round){
  const ready = typeof window.fbListenJury === "function";
  if(!ready){
    return `<div class="jury-warn">실시간 연결을 준비하고 있어요. 잠시만 기다려주세요...</div>`;
  }
  const t = juryTally(round);
  const proPct = t.total ? Math.round(t.pro/t.total*100) : 0;
  const conPct = t.total ? 100-proPct : 0;
  const list = t.entries.slice(0,12).map(e => `
    <div class="jury-card">
      <div class="jury-card-top"><b>${e.name}</b><span class="jc-school">${e.school}</span>${e.winner?`<span class="tag ${e.winner==='찬성측'?'pro':'con'}">${e.winner}</span>`:""}</div>
      ${e.good?`<div class="jc-line">👍 ${e.good}</div>`:""}
      ${e.regret?`<div class="jc-line">🤔 ${e.regret}</div>`:""}
    </div>
  `).join("") || `<div class="jury-empty">아직 제출된 평가가 없어요</div>`;
  return `
    <div class="jury-tally">
      <div class="jury-bar-wrap">
        <div class="jury-bar-labels"><span class="tag pro">찬성 ${t.pro}표</span><span class="tag con">반대 ${t.con}표</span></div>
        <div class="jury-bar"><div class="jury-bar-pro" style="width:${proPct}%"></div><div class="jury-bar-con" style="width:${conPct}%"></div></div>
      </div>
      <div class="jury-total">총 ${t.total}명 제출 · 실시간 반영 중</div>
    </div>
    <div class="jury-list">${list}</div>
  `;
}
function startJuryListening(round){
  if(juryListenRound===round && juryUnsub) return;
  stopJuryListening();
  juryListenRound = round;
  if(typeof window.fbListenJury !== "function"){
    setTimeout(()=>{ if(juryListenRound===round && !juryUnsub) startJuryListening(round); }, 400);
    return;
  }
  juryUnsub = window.fbListenJury(round, (entries)=>{
    juryData[round] = {};
    entries.forEach(e => { juryData[round][e.id] = e; });
    const panel = document.getElementById("jury-panel-body");
    if(panel) panel.innerHTML = renderJuryPanelHTML(round);
  });
}
function stopJuryListening(){
  if(juryUnsub) juryUnsub();
  juryUnsub = null;
  juryListenRound = null;
}
async function resetJuryVotes(round){
  if(typeof window.fbResetJury !== "function") return;
  try{ await window.fbResetJury(round); }catch(e){ console.error(e); }
  juryData[round] = {};
  const panel = document.getElementById("jury-panel-body");
  if(panel) panel.innerHTML = renderJuryPanelHTML(round);
}

/* ---------------- 이벤트 처리 ---------------- */
function attachHandlers(stage, idx){
  document.querySelectorAll("[data-act]").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      const act = btn.dataset.act;

      if(act==="start"){
        const i = btn.dataset.idx;
        const st = timerState[i];
        if(st && !st.running && st.left>0){
          st.running = true;
          st.intervalId = setInterval(()=>tickTimer(i), 1000);
          render();
        }
      } else if(act==="pause"){
        const i = btn.dataset.idx;
        const st = timerState[i];
        if(st){ clearInterval(st.intervalId); st.running = false; }
        render();
      } else if(act==="reset"){
        const i = btn.dataset.idx;
        const prevTotal = timerState[i] ? timerState[i].total : Number(btn.dataset.resetSeconds || 0);
        clearInterval(timerState[i]?.intervalId);
        timerState[i] = { left: prevTotal, total: prevTotal, running:false, intervalId:null };
        render();

      } else if(act==="pick-question"){
        if(fruitQIdx < FRUITBASKET_Q.length-1){ fruitQIdx++; render(); }
      } else if(act==="fruit-restart"){
        fruitQIdx = -1;
        render();

      } else if(act==="speed-start"){
        if(!speedTimer.running && speedTimer.left>0){
          speedTimer.running = true;
          speedTimer.intervalId = setInterval(tickSpeed, 1000);
          render();
        }
      } else if(act==="speed-reset"){
        clearInterval(speedTimer.intervalId);
        speedTimer = { left:30, running:false, intervalId:null };
        render();
      } else if(act==="speed-question"){
        if(speedQueue.length>0){
          speedTopicText = speedQueue.shift();
          render();
        }
      } else if(act==="speed-restart"){
        speedQueue = shuffle(SPEED_TOPICS);
        speedTopicText = "";
        render();

      } else if(act==="vote-pick"){
        const key = btn.dataset.pool;
        const p = votePools[key];
        if(p.remaining.length===0) return;
        spinPick(key);

      } else if(act==="jury-reset"){
        if(confirm("이 라운드의 배심원 투표를 모두 삭제할까요?")){
          resetJuryVotes(btn.dataset.round);
        }
      }
    });
  });
}

function spinPick(key){
  const p = votePools[key];
  const slotEl = document.getElementById(`slot-${key}`);
  let count = 0;
  const maxCount = 14;
  const spin = setInterval(()=>{
    const r = p.remaining[Math.floor(Math.random()*p.remaining.length)];
    if(slotEl) slotEl.textContent = `${r.name} · ${r.school}`;
    count++;
    if(count>=maxCount){
      clearInterval(spin);
      const finalIdx = Math.floor(Math.random()*p.remaining.length);
      const chosen = p.remaining.splice(finalIdx,1)[0];
      p.picked.push(chosen);
      render();
    }
  }, 80);
}

    <div class="jform-wrap">
      <div class="jform-card">
        <div class="eyebrow">라운드 ${round} 배심원 평가</div>
        <h1 class="jform-title display-font">${info.teams[0]} VS ${info.teams[1]}</h1>
        <div class="jform-topic">${info.topic}</div>
        <form id="jury-form">
          <label>학교</label>
          <select name="school" required><option value="" disabled selected>선택하세요</option>${schoolOptions}</select>
          <label>이름</label>
          <input type="text" name="name" placeholder="본인 이름" required>
          <label>더 잘했다고 생각하는 쪽</label>
          <div class="jform-radio-row">
            <label class="jform-radio"><input type="radio" name="winner" value="찬성측" required> 찬성측</label>
            <label class="jform-radio"><input type="radio" name="winner" value="반대측"> 반대측</label>
          </div>
          <label>좋았던 점</label>
          <textarea name="good" rows="2" placeholder="어떤 점이 좋았나요?"></textarea>
          <label>아쉬웠던 점</label>
          <textarea name="regret" rows="2" placeholder="아쉬웠던 점이 있다면?"></textarea>
          <button type="submit" class="action-btn" style="width:100%;">제출하기</button>
        </form>
      </div>
    </div>
  `;

  const form = document.getElementById("jury-form");
  form.addEventListener("submit", async (e)=>{
    e.preventDefault();
    const btn = form.querySelector("button[type=submit]");
    btn.disabled = true;
    btn.textContent = "제출 중...";
    const fd = new FormData(form);
    const data = {
      round, school: fd.get("school"), name: fd.get("name"), winner: fd.get("winner"),
      good: fd.get("good")||"", regret: fd.get("regret")||"", ts: Date.now()
    };
    try{
      let waited = 0;
      while(typeof window.fbSubmitJuryVote !== "function" && waited < 5000){
        await new Promise(r=>setTimeout(r,200));
        waited += 200;
      }
      if(typeof window.fbSubmitJuryVote !== "function") throw new Error("firebase not ready");
      await window.fbSubmitJuryVote(data);
      document.querySelector(".jform-card").innerHTML = `
        <div class="jform-done">
          <div class="jform-done-mark">✅</div>
          <h1 class="jform-title display-font">제출 완료!</h1>
          <p>평가해줘서 고마워요, ${data.name} 님.</p>
        </div>`;
    }catch(err){
      btn.disabled = false;
      btn.textContent = "제출하기";
      alert("제출에 실패했어요. 인터넷 연결을 확인하고 다시 시도해주세요.");
    }
  });
}

/* ---------------- 네비게이션 ---------------- */
function goNext(){ if(current<STAGES.length-1){ current++; render(); } }
function goPrev(){ if(current>0){ current--; render(); } }

if(VOTE_MODE){
  renderJuryFormPage();
} else {
  document.getElementById("next-btn").addEventListener("click", goNext);
  document.getElementById("prev-btn").addEventListener("click", goPrev);
  document.addEventListener("keydown", (e)=>{
    const tag = (e.target && e.target.tagName || "").toLowerCase();
    if(tag==="input" || tag==="textarea" || tag==="select") return;
    if(e.key==="ArrowRight") goNext();
    if(e.key==="ArrowLeft") goPrev();
  });
  document.getElementById("fullscreen-btn").addEventListener("click", ()=>{
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
    else { document.exitFullscreen(); }
  });
  render();
}

</script>
</body>
</html>
